<svg width="260" height="150" viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
  <rect x="2" y="2" width="256" height="146" rx="20" fill="#23212F"/>

  <!-- surbrillance arrondie de la sélection (vignette du milieu) -->
