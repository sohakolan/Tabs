    <!-- vignette 1 -->
    <rect x="22" y="30" width="60" height="64" rx="7" fill="#F2F3FB"/>
    <circle cx="30" cy="38" r="2.6" fill="#FF5F57"/><circle cx="38" cy="38" r="2.6" fill="#FEBC2E"/><circle cx="46" cy="38" r="2.6" fill="#28C840"/>
    <rect x="28" y="48" width="40" height="4" rx="2" fill="#C7CCEA"/>
    <rect x="28" y="56" width="30" height="4" rx="2" fill="#D6DAF0"/>
    <rect x="42" y="86" width="20" height="20" rx="5" fill="#5B8DEF"/>
    <rect x="34" y="112" width="36" height="5" rx="2.5" fill="#6E7290"/>

    <!-- vignette 2 (sélectionnée) -->
    <rect x="100" y="30" width="60" height="64" rx="7" fill="#FFFFFF"/>
    <circle cx="108" cy="38" r="2.6" fill="#FF5F57"/><circle cx="116" cy="38" r="2.6" fill="#FEBC2E"/><circle cx="124" cy="38" r="2.6" fill="#28C840"/>
    <rect x="106" y="48" width="40" height="4" rx="2" fill="#B6BCE2"/>
    <rect x="106" y="56" width="30" height="4" rx="2" fill="#CACFEC"/>
    <rect x="120" y="86" width="20" height="20" rx="5" fill="#34C759"/>
    <rect x="112" y="112" width="36" height="5" rx="2.5" fill="#C9CEF2"/>

    <!-- vignette 3 -->
    <rect x="178" y="30" width="60" height="64" rx="7" fill="#F2F3FB"/>
    <circle cx="186" cy="38" r="2.6" fill="#FF5F57"/><circle cx="194" cy="38" r="2.6" fill="#FEBC2E"/><circle cx="202" cy="38" r="2.6" fill="#28C840"/>
    <rect x="184" y="48" width="40" height="4" rx="2" fill="#C7CCEA"/>
    <rect x="184" y="56" width="30" height="4" rx="2" fill="#D6DAF0"/>
    <rect x="198" y="86" width="20" height="20" rx="5" fill="#FF9F0A"/>
    <rect x="190" y="112" width="36" height="5" rx="2.5" fill="#6E7290"/>
